type: object
required:
  - workflow
  - schema-version
allOf:
  - anyOf:
      - required: [runtime]
      - required: [runtimes]
  - if:
      required: [orchestration]
      properties:
        orchestration:
          type: object
          required: [mode]
          properties:
            mode:
              const: actor-driven
    then: {}
    else: {}
properties:
  workflow:
    enum: [code, change-delivery, release, triage]
  schema-version:
    type: integer
    enum: [1]
  instance:
    type: object
    additionalProperties: true
  repository:
    type: object
    additionalProperties: true
  tracker:
    type: object
    properties:
      kind:
        type: string
      github_slug:
        type: string
      active_states:
        type: array
        items:
          type: string
      terminal_states:
        type: array
        items:
          type: string
      required_labels:
        type: array
        items:
          type: string
      exclude_labels:
        type: array
        items:
          type: string
    additionalProperties: true
  intake:
    type: object
    properties:
      entry:
        type: object
        properties:
          states:
            type: array
            items:
              type: string
          include_labels:
            type: array
            items:
              type: string
          include-labels:
            type: array
            items:
              type: string
          exclude_labels:
            type: array
            items:
              type: string
          exclude-labels:
            type: array
            items:
              type: string
        additionalProperties: true
      claim:
        type: object
        properties:
          remove_labels:
            type: array
            items:
              type: string
          add_labels:
            type: array
            items:
              type: string
          branch:
            type: string
        additionalProperties: true
      auto-activate:
        type: object
        properties:
          enabled:
            type: boolean
          add_label:
            type: string
          exclude_labels:
            type: array
            items:
              type: string
          max-per-tick:
            type: integer
            minimum: 1
        additionalProperties: true
    additionalProperties: true
  workspace:
    type: object
    properties:
      root:
        type: string
      hooks:
        type: object
        properties:
          after_create:
            type: string
          before_remove:
            type: string
        additionalProperties: true
    additionalProperties: true
  polling:
    type: object
    properties:
      interval_ms:
        type: integer
        minimum: 1
    additionalProperties: true
  limits:
    type: object
    properties:
      max_turns:
        type: integer
        minimum: 1
    additionalProperties: true
  code-host:
    type: object
    properties:
      kind:
        type: string
      github_slug:
        type: string
    additionalProperties: true
  execution:
    type: object
    properties:
      actor-dispatch:
        type: string
        enum: [auto, inline, background]
    additionalProperties: true
  orchestration:
    type: object
    required: [mode]
    properties:
      mode:
        type: string
        enum: [orchestrator, actor-driven]
      actor:
        type: string
    additionalProperties: true
  routing:
    type: object
    properties:
      actor-driven:
        type: object
        required: [rules]
        properties:
          rules:
            type: array
            items:
              type: object
              required: [name, when, route]
              properties:
                name:
                  type: string
                when:
                  type: object
                  additionalProperties: true
                route:
                  type: object
                  required: [action, reason]
                  properties:
                    action:
                      type: string
                      enum: [dispatch, hold, release, move_board, wait_review]
                    stage:
                      type: string
                    actor:
                      type: string
                    mode:
                      type: string
                    target_board_state:
                      type: string
                    reason:
                      type: string
                    inputs:
                      type: object
                      additionalProperties: true
                  additionalProperties: true
              additionalProperties: false
        additionalProperties: true
    additionalProperties: true
  concurrency:
    type: object
    properties:
      max-lanes:
        type: integer
        minimum: 1
      max-active-lanes:
        type: integer
        minimum: 1
      max-implementers:
        type: integer
        minimum: 1
      max-reviewers:
        type: integer
        minimum: 1
      actors:
        type: object
        additionalProperties:
          oneOf:
            - type: integer
              minimum: 1
            - type: object
              properties:
                max-running:
                  type: integer
                  minimum: 1
                limit:
                  type: integer
                  minimum: 1
              additionalProperties: true
      per-lane-lock:
        type: boolean
    additionalProperties: true
  recovery:
    type: object
    properties:
      running-stale-seconds:
        type: integer
        minimum: 0
      auto-retry-interrupted:
        type: boolean
    additionalProperties: true
  retry:
    type: object
    properties:
      max-attempts:
        type: integer
        minimum: 1
      initial-delay-seconds:
        type: integer
        minimum: 0
      backoff-multiplier:
        type: number
        minimum: 1
      max-delay-seconds:
        type: integer
        minimum: 0
    additionalProperties: true
  notifications:
    type: object
    properties:
      review-changes-requested:
        type: object
        properties:
          pull-request-review:
            type: boolean
          pull-request-comment:
            type: boolean
          issue-comment:
            type: boolean
        additionalProperties: true
    additionalProperties: true
  completion:
    type: object
    properties:
      remove_labels:
        type: array
        items:
          type: string
      add_labels:
        type: array
        items:
          type: string
      auto-merge:
        type: object
        properties:
          enabled:
            type: boolean
          method:
            type: string
            enum: [squash, merge, rebase]
          delete-branch:
            type: boolean
        additionalProperties: true
    additionalProperties: true
  orchestrator:
    type: object
    required: [actor]
    properties:
      actor:
        type: string
      context:
        type: object
        properties:
          max-input-chars:
            type: integer
          warn-input-chars:
            type: integer
          max-string-chars:
            type: integer
          max-list-items:
            type: integer
          max-terminal-lanes:
            type: integer
        additionalProperties: true
    additionalProperties: true
  runtimes:
    type: object
    additionalProperties:
      type: object
      additionalProperties: true
  runtime:
    type: object
    additionalProperties: true
  actors:
    type: object
    additionalProperties:
      type: object
      required: [runtime]
      properties:
        runtime:
          type: string
        model:
          type: string
        mode:
          type: string
      additionalProperties: true
  stages:
    type: object
    additionalProperties:
      type: object
      properties:
        actors:
          type: array
          items:
            type: string
        actions:
          type: array
          items:
            type: string
        gates:
          type: array
          items:
            type: string
        next:
          type: string
      additionalProperties: true
  gates:
    description: Legacy orchestrator-mode gate definitions. Actor-driven workflows use routing instead.
    type: object
    additionalProperties:
      type: object
      required: [type]
      properties:
        type:
          enum: [orchestrator-evaluated]
      additionalProperties: true
  actions:
    description: Legacy orchestrator-mode deterministic action definitions. Actor-driven workflows use routing instead.
    type: object
    additionalProperties:
      type: object
      required: [type]
      properties:
        type:
          type: string
      additionalProperties: true
  storage:
    type: object
    additionalProperties: true
additionalProperties: true
