type: object
required:
  - workflow
  - schema-version
allOf:
  - anyOf:
      - required: [runtime]
      - required: [runtimes]
properties:
  workflow:
    enum: [code]
  schema-version:
    type: integer
    enum: [1]
  template:
    type: string
  instance:
    type: object
    additionalProperties: true
  repository:
    type: object
    additionalProperties: true
  tracker:
    type: object
    properties:
      kind:
        type: string
      github_slug:
        type: string
      active_states:
        type: array
        items:
          type: string
      terminal_states:
        type: array
        items:
          type: string
      required_labels:
        type: array
        items:
          type: string
      exclude_labels:
        type: array
        items:
          type: string
    additionalProperties: true
  code-host:
    type: object
    properties:
      kind:
        type: string
      github_slug:
        type: string
    additionalProperties: true
  intake:
    type: object
    properties:
      entry:
        type: object
        properties:
          states:
            type: array
            items:
              type: string
          include_labels:
            type: array
            items:
              type: string
          include-labels:
            type: array
            items:
              type: string
          exclude_labels:
            type: array
            items:
              type: string
          exclude-labels:
            type: array
            items:
              type: string
        additionalProperties: true
      claim:
        type: object
        properties:
          remove_labels:
            type: array
            items:
              type: string
          add_labels:
            type: array
            items:
              type: string
          branch:
            type: string
        additionalProperties: true
    additionalProperties: true
  workspace:
    type: object
    properties:
      root:
        type: string
      hooks:
        type: object
        properties:
          after_create:
            type: string
          before_remove:
            type: string
        additionalProperties: true
    additionalProperties: true
  workpad:
    type: object
    properties:
      owner:
        type: string
        enum: [runner, actor, none]
      enabled:
        type: boolean
    additionalProperties: true
  polling:
    type: object
    properties:
      interval_ms:
        type: integer
        minimum: 1
    additionalProperties: true
  limits:
    type: object
    properties:
      max_turns:
        type: integer
        minimum: 1
    additionalProperties: true
  execution:
    type: object
    properties:
      actor-dispatch:
        type: string
        enum: [auto, inline, background]
    additionalProperties: true
  concurrency:
    type: object
    properties:
      max-lanes:
        type: integer
        minimum: 1
      max-active-lanes:
        type: integer
        minimum: 1
      actors:
        type: object
        additionalProperties:
          oneOf:
            - type: integer
              minimum: 1
            - type: object
              properties:
                max-running:
                  type: integer
                  minimum: 1
                limit:
                  type: integer
                  minimum: 1
              additionalProperties: true
      per-lane-lock:
        type: boolean
    additionalProperties: true
  recovery:
    type: object
    properties:
      running-stale-seconds:
        type: integer
        minimum: 0
      auto-retry-interrupted:
        type: boolean
    additionalProperties: true
  retry:
    type: object
    properties:
      max-attempts:
        type: integer
        minimum: 1
      initial-delay-seconds:
        type: integer
        minimum: 0
      backoff-multiplier:
        type: number
        minimum: 1
      max-delay-seconds:
        type: integer
        minimum: 0
    additionalProperties: true
  notifications:
    type: object
    additionalProperties: true
  runtimes:
    type: object
    additionalProperties:
      type: object
      additionalProperties: true
  runtime:
    type: object
    additionalProperties: true
  storage:
    type: object
    additionalProperties: true
additionalProperties: true
